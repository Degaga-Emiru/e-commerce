version: "1"

databases:
  - name: ecommerce-db
    databaseName: ecommerce_prod
    user: root
    plan: free

services:
  # -------------------------
  # Backend Spring Boot API
  # -------------------------
  - type: web
    name: ecommerce-api
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # -------------------------
  # Frontend Next.js Web App
  # -------------------------
  - type: web
    name: ecommerce-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
